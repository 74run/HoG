<form action="/submit_housing_details" method="post">
    <label for="length_stay_shelter">Length of Stay in Maternity Shelter:</label>
    <input type="text" id="length_stay_shelter" name="length_stay_shelter" required><br>
    
    <label for="reason_leaving_shelter">Reason for Leaving the Maternity Shelter:</label>
    <input type="text" id="reason_leaving_shelter" name="reason_leaving_shelter" required><br>
    
    <label for="moved_to_transitional_housing">Did the Client Move to HoG or Partner Transitional Housing?</label>
    <select id="moved_to_transitional_housing" name="moved_to_transitional_housing" required>
        <option value="">Select...</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select><br>
    
    <label for="length_stay_transitional_housing">Length of Stay in Transitional Housing:</label>
    <input type="text" id="length_stay_transitional_housing" name="length_stay_transitional_housing"><br>
    
    <label for="housing_voucher_recipient">Housing Voucher Recipient:</label>
    <select id="housing_voucher_recipient" name="housing_voucher_recipient" required>
        <option value="">Select...</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select><br>
    
    <label for="case_management_assistance">Did Case Management Assist in Finding Housing?</label>
    <select id="case_management_assistance" name="case_management_assistance" required>
        <option value="">Select...</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select><br>
    
    <input type="submit" id="submitBtn" value="Next" onclick="">
</form>
