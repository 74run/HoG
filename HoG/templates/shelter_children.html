<form action="/submit_shelter_children_details" method="post">
    <label for="child_name">Child Name:</label>
    <input type="text" id="child_name" name="child_name" required><br>
    
    <label for="birthdate">Birth Date:</label>
    <input type="date" id="birthdate" name="birthdate" required><br>
    
    <label for="age">Age:</label>
    <input type="number" id="age" name="age" required><br>
    
    <label for="grade_level">Daycare or School Grade Level:</label>
    <input type="text" id="grade_level" name="grade_level" required><br>
    
    <label for="trauma_programming_hours">Hours of Trauma-Informed Programming Received:</label>
    <input type="number" id="trauma_programming_hours" name="trauma_programming_hours" required><br>
    
    <input type="submit" id="submitBtn" value="Next" onclick="">
</form>
